# ============================================================================
# genimage.cfg — SD Card Partition Layout for ZYBO Z7
# ============================================================================
# Creates a bootable SD card image with:
#   Partition 1: FAT32 (boot) — BOOT.BIN, uImage, devicetree.dtb
#   Partition 2: ext4  (root) — root filesystem
# ============================================================================

image sdcard.img {
    hdimage {
        # 1 GB card image
        gpt = false
    }

    # FAT32 boot partition
    partition boot {
        partition-type = 0xC
        bootable = true
        size = 64M
        image = "boot.vfat"
    }

    # ext4 root filesystem
    partition rootfs {
        partition-type = 0x83
        image = "rootfs.ext4"
    }
}

image boot.vfat {
    vfat {
        files = {
            "BOOT.BIN",
            "uImage",
            "zynq-zybo-z7.dtb",
        }
    }
    size = 64M
}

image rootfs.ext4 {
    ext4 {
        label = "rootfs"
    }
    size = 256M
}
