# ZYBO Audio Linux — GitHub Actions (Manual Only)

name: Buildroot Build

on:
  workflow_dispatch:  # manual trigger only, no automatic build on push

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Buildroot Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential flex bison libssl-dev libncurses-dev \
          rsync cpio unzip wget bc python3

    - name: Setup Buildroot
      run: |
        if [ ! -d buildroot/.git ]; then
          git clone --depth 1 --branch 2024.02 \
            https://github.com/buildroot/buildroot.git buildroot
        fi

    - name: Configure
      run: |
        cd buildroot
        make BR2_EXTERNAL=../external zybo_z7_audio_defconfig

    - name: Build
      run: |
        cd buildroot
        make -j$(nproc) 2>&1 | tee build.log

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: zybo-linux-sdcard
        path: |
          buildroot/output/images/sdcard.img
          buildroot/output/images/zynq-zybo-z7.dtb
          buildroot/output/images/uImage
          buildroot/output/images/rootfs.tar
          buildroot/build.log
        retention-days: 30
